<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candlestick Chart</title>
<style>
  * {
    background: #121212;
  }
</style>
</head>
<body>
<div id="chart"></div>
<script type="module">
import { CandlestickChart } from '../candlestick/candlestick.js'

const res = await fetch('../collections/candlestick.json')
const allData = await res.json()
const h1Data = allData.filter(d => d.timeframe === 'h1')

const chart = new CandlestickChart('#chart', {
  width: 600,
  height: 300,
  limit: 100,
  load: async (beforeDate) => {
    if (!beforeDate) return h1Data.slice(-100).reverse()
    const idx = h1Data.findIndex(d => d.date >= beforeDate)
    if (idx <= 0) return []
    const start = Math.max(0, idx - 100)
    return h1Data.slice(start, idx).reverse()
  }
})
</script>
</body>
</html>
